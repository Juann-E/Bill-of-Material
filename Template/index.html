<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Proposal.css">
    <title>Lucia: Crimson Weave - Project Tracker</title>
</head>
<body>
    <div class="tabs">
        <input type="radio" name="tabs" id="tabone" checked="checked">
        <label for="tabone">Bill of Material</label>
        <div class="tab-content">
            <h1>Lucia: Crimson Weave | NightBlaze</h1>
            <div class="header-info" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #03294e; padding-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                <div class="links" style="display: flex; gap: 10px; align-items: center;">
                    <a href="https://grayravens.com/wiki/Lucia:_Crimson_Weave" target="_blank" style="padding: 5px 10px; background: #03294e; color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold;">Crimson Weave Wiki</a>
                    <a href="https://docs.google.com/spreadsheets/d/1kM1vcZc6peXadFJ-1lXSIgIsHUx-P8v0Qf_Ca3O-1ZI/edit?gid=0#gid=0" target="_blank" style="padding: 5px 10px; background: #107c41; color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold;">Spreadsheet</a>
                </div>
                
                <div class="stats" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <span style="font-size: 0.9rem;">Tersedia: <strong id="count-tersedia" style="color: #2e7d32;">0</strong></span>
                    <span style="font-size: 0.9rem;">Belum: <strong id="count-belum" style="color: #d32f2f;">0</strong></span>
                    <span id="total-cost-display" style="color: #03294e; background: #e1f5fe; padding: 8px 15px; border-radius: 4px;">
                        Total Cost: <strong id="total-cost-val" style="color: #d32f2f;">Memuat...</strong>
                    </span>
                </div>
            </div>

            <div class="tab-data">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Item</th>
                            <th>Type</th>
                            <th>Color</th>
                            <th>Quantity</th>
                            <th>Cost/PCS</th>
                            <th>Total Cost</th>
                            <th>Status</th>
                            <th>Link</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="10" style="text-align: center;">Memuat data dari Spreadsheet...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <input type="radio" name="tabs" id="tabtwo">
        <label for="tabtwo" onclick="window.location.href='media.html'">Media</label>

        <input type="radio" name="tabs" id="tabthree">
        <label for="tabthree" onclick="window.location.href='duration.html'">Duration</label>
    </div>

    <button id="btn-back-to-top" title="Kembali ke Atas">↑</button>


    <script src="../JS/script.js"></script>
</body>
</html>
